name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools cython numpy matplotlib scipy pandas

    - name: Compile Cython extensions
      run: |
        python setup.py build_ext --inplace

    - name: Install package with dev dependencies
      run: |
        pip install -e ".[dev]"

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest ecopy/tests/ -v

    - name: Debug imports
      run: |
        python -c "from ecopy.diversity import rarefy" 2>&1 || true
        python -c "import ecopy; print('load_data' in dir(ecopy))"
